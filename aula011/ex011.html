<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.3em;
            background-color: lightgreen
        }
    </style>
</head>
<body>
    <h1>Sistemas de Nacionalidade</h1>
    Você nasceu no <input type="text" name="txtp" id="txtp">
    <input type="button" value="Verificar" onclick="descobrir()">
    <id id="res">

    </id>

    <script>
        function descobrir() {
            var txtpa = window.document.getElementById('txtp')
            var res = window.document.getElementById('res')
            res.innerHTML = `<p>Você nasceu no ${txtpa.value}</p>`
            if (txtpa.value == 'Brasil') {
                res.innerHTML += `<p>Você é Brasileiro, um fudido de merda!</p>`
            } else {
                res.innerHTML += `<p>Você é um Estrangeiro, muito top!</p>`
            }

        }
    </script>
</body>
</html>
